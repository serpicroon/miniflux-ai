version: 2
updates:
  # Enable version updates for Python
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
      scope: "deps"
    pull-request-branch-name:
      separator: "/"
    labels:
      - "dependencies"
      - "python"
    reviewers:
      - "serpicroon"
    assignees:
      - "serpicroon"

  # Enable GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
      scope: "ci"
    pull-request-branch-name:
      separator: "/"
    labels:
      - "github-actions"
      - "dependencies"
    reviewers:
      - "serpicroon"
    assignees:
      - "serpicroon"
